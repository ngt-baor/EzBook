services:
  - type: web
    name: ezbook
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: EZBOOK_DB_HOST
        sync: false
      - key: EZBOOK_DB_PORT
        value: 5432
      - key: EZBOOK_DB_NAME
        value: postgres
      - key: EZBOOK_DB_USER
        sync: false
      - key: EZBOOK_DB_PASSWORD
        sync: false
      - key: EZBOOK_DB_SSL_MODE
        value: require
      - key: EZBOOK_MAIL_USERNAME
        sync: false
      - key: EZBOOK_MAIL_APP_PASSWORD
        sync: false
